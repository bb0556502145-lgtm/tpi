<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- إعدادات الشاشة الرئيسية في الآيفون -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="إدارة المساكن">
    <!-- رابط الأيقونة (تأكد من وجود صورة باسم icon.png في نفس المجلد) -->
    <link rel="apple-touch-icon" href="electricity.png">
    <title>إدارة المساكن - نظام الفواتير</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Ionicons for some icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>

    <div class="container no-print">
        <header>
            <h1>إدارة المساكن 🏢</h1>
            <p class="subtitle">نظام إدارة المستأجرين والفواتير المتكامل</p>
        </header>

        <!-- Main Content Area -->
        <main id="app">
            <!-- Views will be injected here -->
        </main>
    </div>

    <footer class="site-footer no-print">
        <p>TURKI ALSHEHRI</p>
        <p><a href="mailto:tpix.cs@gmail.com">tpix.cs@gmail.com</a></p>
    </footer>

    <!-- Hidden Print Area -->
    <div id="printArea" class="print-only hidden"></div>

    <!-- Add Tenant Modal -->
    <div id="tenantModal" class="modal-overlay">
        <div class="modal">
            <div class="card-header">
                <h3>إضافة مستأجر جديد</h3>
                <button class="btn-outline" onclick="UI.closeModal('tenantModal')">✕</button>
            </div>
            <form id="tenantForm">
                <input type="hidden" id="tenantId">
                <div class="form-group">
                    <label>اسم المستأجر</label>
                    <input type="text" id="tenantName" required placeholder="مثال: محمد أحمد">
                </div>
                <div class="form-group">
                    <label>رقم الشقة</label>
                    <input type="text" id="tenantApt" required placeholder="مثال: 101">
                </div>
                <div class="form-group">
                    <label>رقم حساب العداد</label>
                    <input type="text" id="tenantMeter" placeholder="اختياري">
                </div>
                <div class="form-group">
                    <label>رقم الجوال</label>
                    <input type="tel" id="tenantPhone" placeholder="اختياري">
                </div>
                <button type="submit" class="btn btn-primary w-full">حفظ البيانات</button>
            </form>
        </div>
    </div>

    <!-- Create Bill Modal -->
    <div id="billModal" class="modal-overlay">
        <div class="modal">
            <div class="card-header">
                <h3>فاتورة جديدة</h3>
                <button class="btn-outline" onclick="UI.closeModal('billModal')">✕</button>
            </div>
            <form id="billForm">
                <input type="hidden" id="billTenantId">

                <div class="form-group">
                    <label>المستأجر</label>
                    <input type="text" id="billTenantName" disabled style="background: #f3f4f6;">
                </div>

                <div class="flex gap-4">
                    <div class="form-group w-full">
                        <label>القراءة السابقة</label>
                        <input type="number" step="0.01" id="prevReading" oninput="UI.updateBillPreview()">
                    </div>
                    <div class="form-group w-full">
                        <label>القراءة الحالية</label>
                        <input type="number" step="0.01" id="currReading" oninput="UI.updateBillPreview()">
                    </div>
                </div>

                <div class="form-group">
                    <label>الاستهلاك (إدخال مباشر)</label>
                    <input type="number" step="0.01" id="directUsage"
                        placeholder="اختياري - سيتم تجاهل القراءات أعلاه إذا تم إدخاله"
                        oninput="UI.updateBillPreview()">
                </div>

                <div class="form-group">
                    <label>رسوم العداد (ريال)</label>
                    <input type="number" step="0.01" id="meterFee" value=" " oninput="UI.updateBillPreview()">
                </div>

                <!-- Live Preview -->
                <div style="background: #ecfdf5; padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1rem;">
                    <div class="flex justify-between mb-2">
                        <span>الاستهلاك:</span>
                        <strong id="previewUsage">0.00 ك.و.س</strong>
                    </div>
                    <div class="flex justify-between mb-2">
                        <span>المبلغ قبل الضريبة:</span>
                        <strong id="previewSubtotal">0.00 ريال</strong>
                    </div>
                    <div class="flex justify-between mb-2">
                        <span>الضريبة (15%):</span>
                        <strong id="previewVat">0.00 ريال</strong>
                    </div>
                    <div class="flex justify-between border-t pt-2 mt-2">
                        <span
                            style="font-size: 1.1rem; font-weight: bold; color: var(--primary-color);">الإجمالي:</span>
                        <strong style="font-size: 1.1rem; color: var(--primary-color);" id="previewTotal">0.00
                            ريال</strong>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label>حالة السداد</label>
                    <select id="isPaid"
                        style="width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 4px; font-family: inherit;">
                        <option value="false">غير مسددة</option>
                        <option value="true">مسددة</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-full">إصدار الفاتورة</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/billing.js"></script>
    <script src="js/store.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
